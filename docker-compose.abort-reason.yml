# Multi-group, no-ACL cluster for the live transaction-abort-reason tests
# (io.dgraph.AbortReasonLiveTest). Two alpha groups (replicas=1) enable the
# predicate-move case; the single zero is restartable for the stale-startts case.
#
# Usage:
#   make local-image                 # build dgraph/dgraph:local from this branch
#   docker compose -f docker-compose.abort-reason.yml up -d
#   TEST_GRPC_PORT=9180 \
#   TEST_ZERO_HTTP=localhost:6180 \
#   TEST_ZERO_RESTART_CMD="docker compose -f docker-compose.abort-reason.yml restart zero1" \
#     ./gradlew test --tests io.dgraph.AbortReasonLiveTest
#   docker compose -f docker-compose.abort-reason.yml down
version: "3.5"
services:
  zero1:
    image: dgraph/dgraph:local
    container_name: ar_zero1
    ports:
      - 5180:5180
      - 6180:6180
    command: dgraph zero -o 100 --my=zero1:5180 --replicas=1 --logtostderr -v=2 --bindall

  alpha1:
    image: dgraph/dgraph:local
    container_name: ar_alpha1
    ports:
      - 8180:8180
      - 9180:9180
    command:
      dgraph alpha -o 100 --my=alpha1:7180 --zero=zero1:5180 --logtostderr -v=2 --raft "idx=1;
      group=1" --security "whitelist=0.0.0.0/0;"

  alpha2:
    image: dgraph/dgraph:local
    container_name: ar_alpha2
    ports:
      - 8182:8182
      - 9182:9182
    command:
      dgraph alpha -o 102 --my=alpha2:7182 --zero=zero1:5180 --logtostderr -v=2 --raft "idx=2;
      group=2" --security "whitelist=0.0.0.0/0;"
